# Apache mpm_event tuning. In production this is replaced by the
# puppet-managed /opt/nextcloud/mpm_event.conf bind-mount; values here are
# sane standalone defaults.
#
# Event threads only shuttle requests to php-fpm, so connections can vastly
# outnumber PHP workers and queue cheaply. PHP concurrency is bounded by
# pm.max_children in the fpm pool, NOT by these numbers.
#
# ServerLimit * ThreadsPerChild = max simultaneous connections.

<IfModule mpm_event_module>
        StartServers              4
        MinSpareThreads           64
        MaxSpareThreads           256
        ThreadLimit               64
        ThreadsPerChild           64
        MaxRequestWorkers         1024
        MaxConnectionsPerChild    0
        ServerLimit               16
        AsyncRequestWorkerFactor  2
</IfModule>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
