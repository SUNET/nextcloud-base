; Nextcloud php-fpm pool. In production this file is replaced by the
; puppet-managed /opt/nextcloud/php-fpm-www.conf bind-mount; the values here
; are sane standalone defaults. Loaded last (zzz-) so it wins over any stock
; pool config shipped in the base image.
[www]
user = www-data
group = www-data

listen = /run/php/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 180
pm.start_servers = 32
pm.min_spare_servers = 16
pm.max_spare_servers = 48
pm.max_requests = 1000

; Nextcloud reads configuration from environment variables (DB, redis, S3,
; NEXTCLOUD_*). fpm clears the environment by default, so keep it.
clear_env = no

; Surface worker stdout/stderr on the container log.
catch_workers_output = yes
decorate_workers_output = no

; Don't kill long-running requests (30G uploads, occ jobs); matches
; max_execution_time in nce.ini.
request_terminate_timeout = 0

slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s
