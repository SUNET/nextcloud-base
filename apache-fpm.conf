# php-fpm proxy worker + long timeouts.
#
# Apache's default ProxyTimeout is 60s; with max_execution_time=86400 and
# 30G uploads that would 504 mid-request. Match PHP's ceiling here.
Timeout 86400
ProxyTimeout 86400
DirectoryIndex index.php index.html

<Proxy "unix:/run/php/php-fpm.sock|fcgi://localhost">
    ProxySet timeout=86400
</Proxy>

